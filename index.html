<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Report Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #21253a;
      --border: #2e3248;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #e2e8f0;
      --muted: #8892a4;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: fixed; top: 0; left: 0;
      width: 220px; height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 0 0 16px 0;
      z-index: 100;
    }
    .sidebar-logo {
      padding: 22px 20px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .sidebar-logo svg { flex-shrink: 0; }
    .sidebar-logo span {
      font-size: 1.05rem; font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .sidebar-section {
      padding: 18px 14px 6px;
      font-size: .7rem; font-weight: 600;
      color: var(--muted); letter-spacing: .08em; text-transform: uppercase;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 20px; cursor: pointer;
      border-radius: 8px; margin: 2px 8px;
      color: var(--muted); font-size: .9rem;
      transition: background .15s, color .15s;
      position: relative;
    }
    .sidebar-item:hover { background: var(--surface2); color: var(--text); }
    .sidebar-item.active { background: rgba(108,99,255,.18); color: var(--accent2); font-weight: 600; }
    .sidebar-item .badge {
      margin-left: auto; background: var(--accent);
      color: #fff; font-size: .65rem; font-weight: 700;
      border-radius: 999px; padding: 1px 7px; min-width: 20px; text-align: center;
    }
    .sidebar-item svg { width: 17px; height: 17px; flex-shrink: 0; }

    /* ── MAIN ── */
    .main { margin-left: 220px; min-height: 100vh; }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 90;
      background: rgba(15,17,23,.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex; align-items: center; gap: 14px;
    }
    .topbar h1 { font-size: 1.15rem; font-weight: 700; flex: 1; }
    .search-wrap {
      position: relative; flex: 1; max-width: 340px;
    }
    .search-wrap svg {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--muted); width: 16px; height: 16px;
    }
    .search-wrap input {
      width: 100%; padding: 8px 14px 8px 34px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: .88rem;
      outline: none; transition: border .15s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }
    .stat-pill {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 999px; padding: 6px 14px; font-size: .82rem;
    }
    .stat-pill b { color: var(--accent2); }

    /* ── CONTENT ── */
    .content { padding: 28px; }

    /* ── CATEGORY FILTER TABS ── */
    .filter-tabs {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;
    }
    .filter-tab {
      padding: 6px 16px; border-radius: 999px; cursor: pointer;
      font-size: .83rem; font-weight: 600;
      border: 1.5px solid var(--border);
      background: var(--surface); color: var(--muted);
      transition: all .15s;
    }
    .filter-tab:hover { border-color: var(--accent2); color: var(--text); }
    .filter-tab.active {
      background: var(--accent); border-color: var(--accent);
      color: #fff;
    }

    /* ── PROJECT GROUP ── */
    .project-group { margin-bottom: 32px; }
    .project-heading {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .project-heading h2 {
      font-size: 1rem; font-weight: 700; color: var(--text);
    }
    .project-heading .count {
      font-size: .75rem; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 999px;
      padding: 1px 10px; color: var(--muted);
    }
    .project-divider {
      height: 1.5px;
      background: linear-gradient(90deg, var(--border), transparent);
      margin-bottom: 12px;
    }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    th {
      padding: 11px 16px; text-align: left;
      font-size: .75rem; font-weight: 700;
      color: var(--muted); text-transform: uppercase; letter-spacing: .06em;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(108,99,255,.06); }
    td { padding: 13px 16px; font-size: .88rem; vertical-align: middle; }

    /* ── REPORT NAME CELL ── */
    .report-name { display: flex; align-items: center; gap: 10px; }
    .cat-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem; font-weight: 800; flex-shrink: 0;
      letter-spacing: -.5px;
    }
    .cat-web    { background: rgba(99,179,237,.15); color: #63b3ed; }
    .cat-api    { background: rgba(104,211,145,.15); color: #68d391; }
    .cat-mobile { background: rgba(246,173,85,.15); color: #f6ad55; }
    .cat-security { background: rgba(239,68,68,.15); color: #f87171; }
    .cat-performance { background: rgba(167,139,250,.15); color: #a78bfa; }
    .cat-ui-ux  { background: rgba(237,137,54,.15); color: #ed8936; }
    .cat-misc   { background: rgba(160,174,192,.15); color: #a0aec0; }

    .report-info .name { font-weight: 600; color: var(--text); }
    .report-info .sub  { font-size: .75rem; color: var(--muted); margin-top: 2px; }

    /* ── CATEGORY BADGE ── */
    .cat-badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 999px;
      font-size: .73rem; font-weight: 700;
    }

    /* ── DATETIME ── */
    .datetime { color: var(--muted); font-size: .82rem; }

    /* ── ACTIONS ── */
    .actions { display: flex; align-items: center; gap: 8px; }
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 13px; border-radius: 7px;
      font-size: .8rem; font-weight: 600; cursor: pointer;
      border: none; transition: all .15s; text-decoration: none;
    }
    .btn svg { width: 14px; height: 14px; }
    .btn-view {
      background: rgba(108,99,255,.18); color: var(--accent2);
      border: 1px solid rgba(108,99,255,.3);
    }
    .btn-view:hover { background: rgba(108,99,255,.35); }
    .btn-copy {
      background: var(--surface2); color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-copy:hover { color: var(--text); border-color: var(--accent2); }
    .btn-copy.copied { color: var(--green); border-color: var(--green); }

    /* ── 3DOT MENU ── */
    .dot-wrap { position: relative; }
    .dot-btn {
      width: 30px; height: 30px; border-radius: 7px;
      background: var(--surface2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted); transition: all .15s;
    }
    .dot-btn:hover { color: var(--text); border-color: var(--accent2); }
    .dot-btn svg { width: 15px; height: 15px; }
    .dropdown {
      position: absolute; right: 0; top: 36px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; min-width: 160px;
      box-shadow: var(--shadow); z-index: 200;
      overflow: hidden; display: none;
    }
    .dropdown.open { display: block; animation: fadeIn .12s ease; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: translateY(0); } }
    .dropdown-item {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 16px; cursor: pointer;
      font-size: .85rem; color: var(--muted);
      transition: background .12s, color .12s;
    }
    .dropdown-item:hover { background: rgba(108,99,255,.12); color: var(--text); }
    .dropdown-item.danger { color: var(--red); }
    .dropdown-item.danger:hover { background: rgba(239,68,68,.1); }
    .dropdown-item svg { width: 14px; height: 14px; }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: .4; }
    .empty p { font-size: .95rem; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 18px;
      display: flex; align-items: center; gap: 10px;
      box-shadow: var(--shadow); z-index: 9999;
      font-size: .88rem; color: var(--text);
      transform: translateY(80px); opacity: 0;
      transition: all .25s ease;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast-icon { color: var(--green); }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.65);
      backdrop-filter: blur(4px); z-index: 500;
      display: none; align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px;
      width: 100%; max-width: 440px; box-shadow: var(--shadow);
      animation: fadeIn .15s ease;
    }
    .modal h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 18px; }
    .modal label { font-size: .82rem; color: var(--muted); display: block; margin-bottom: 5px; }
    .modal input, .modal textarea {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 13px; color: var(--text); font-size: .88rem;
      outline: none; margin-bottom: 14px; transition: border .15s;
      font-family: inherit;
    }
    .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
    .modal textarea { resize: vertical; min-height: 70px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
    .btn-cancel {
      background: var(--surface2); color: var(--muted);
      border: 1px solid var(--border); padding: 8px 18px;
      border-radius: 8px; font-size: .88rem; cursor: pointer;
    }
    .btn-save {
      background: var(--accent); color: #fff;
      border: none; padding: 8px 20px;
      border-radius: 8px; font-size: .88rem; font-weight: 600; cursor: pointer;
    }
    .btn-save:hover { background: var(--accent2); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="8" fill="url(#lg)"/>
      <path d="M8 10h12M8 14h8M8 18h10" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      <defs><linearGradient id="lg" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
        <stop stop-color="#6c63ff"/><stop offset="1" stop-color="#a78bfa"/>
      </linearGradient></defs>
    </svg>
    <span>ReportHub</span>
  </div>

  <div class="sidebar-section">Navigation</div>
  <div class="sidebar-item active" onclick="filterCat('all')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    All Reports
    <span class="badge" id="badge-all">0</span>
  </div>

  <div class="sidebar-section">Categories</div>
  <div class="sidebar-item" onclick="filterCat('web')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    Web <span class="badge" id="badge-web">0</span>
  </div>
  <div class="sidebar-item" onclick="filterCat('api')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    API <span class="badge" id="badge-api">0</span>
  </div>
  <div class="sidebar-item" onclick="filterCat('mobile')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
    Mobile <span class="badge" id="badge-mobile">0</span>
  </div>
  <div class="sidebar-item" onclick="filterCat('security')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    Security <span class="badge" id="badge-security">0</span>
  </div>
  <div class="sidebar-item" onclick="filterCat('performance')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
    Performance <span class="badge" id="badge-performance">0</span>
  </div>
  <div class="sidebar-item" onclick="filterCat('ui-ux')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
    UI/UX <span class="badge" id="badge-ui-ux">0</span>
  </div>
  <div class="sidebar-item" onclick="filterCat('misc')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
    Misc <span class="badge" id="badge-misc">0</span>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <h1 id="page-title">All Reports</h1>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Search reports..." oninput="renderAll()">
    </div>
    <div class="stat-pill">Total: <b id="total-count">0</b></div>
  </div>

  <div class="content">
    <div class="filter-tabs" id="filter-tabs">
      <div class="filter-tab active" onclick="filterCat('all')">All</div>
      <div class="filter-tab" onclick="filterCat('web')">Web</div>
      <div class="filter-tab" onclick="filterCat('api')">API</div>
      <div class="filter-tab" onclick="filterCat('mobile')">Mobile</div>
      <div class="filter-tab" onclick="filterCat('security')">Security</div>
      <div class="filter-tab" onclick="filterCat('performance')">Performance</div>
      <div class="filter-tab" onclick="filterCat('ui-ux')">UI/UX</div>
      <div class="filter-tab" onclick="filterCat('misc')">Misc</div>
    </div>

    <div id="reports-container"></div>
  </div>
</main>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg class="toast-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toast-msg">Link copied!</span>
</div>

<!-- EDIT MODAL -->
<div class="modal-backdrop" id="edit-modal">
  <div class="modal">
    <h3>Edit Report</h3>
    <label>Report Name</label>
    <input type="text" id="edit-name" placeholder="Report name"/>
    <label>Project</label>
    <input type="text" id="edit-project" placeholder="Project name"/>
    <label>Comment</label>
    <textarea id="edit-comment" placeholder="Comment"></textarea>
    <label>Docs URL</label>
    <input type="text" id="edit-docs" placeholder="https://..."/>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
let allData = [];
let currentCat = 'all';
let editIndex = null;

const catColors = {
  web: 'cat-web', api: 'cat-api', mobile: 'cat-mobile',
  security: 'cat-security', performance: 'cat-performance',
  'ui-ux': 'cat-ui-ux', misc: 'cat-misc'
};
const catLabels = {
  web: 'WEB', api: 'API', mobile: 'MOB',
  security: 'SEC', performance: 'PERF',
  'ui-ux': 'UI', misc: 'MISC'
};
const catBadgeColors = {
  web:    '#63b3ed', api:  '#68d391', mobile: '#f6ad55',
  security: '#f87171', performance: '#a78bfa',
  'ui-ux': '#ed8936', misc: '#a0aec0'
};

async function loadData() {
  try {
    const res = await fetch('data.json?_=' + Date.now());
    if (!res.ok) throw new Error();
    allData = await res.json();
  } catch {
    allData = [];
  }
  updateBadges();
  renderAll();
}

function updateBadges() {
  const counts = {};
  allData.forEach(r => {
    counts[r.category] = (counts[r.category] || 0) + 1;
  });
  document.getElementById('badge-all').textContent = allData.length;
  ['web','api','mobile','security','performance','ui-ux','misc'].forEach(c => {
    const el = document.getElementById('badge-' + c);
    if (el) el.textContent = counts[c] || 0;
  });
}

function filterCat(cat) {
  currentCat = cat;
  // sidebar items
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick') === `filterCat('${cat}')`);
  });
  // filter tabs
  document.querySelectorAll('.filter-tab').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick') === `filterCat('${cat}')`);
  });
  const titles = { all:'All Reports', web:'Web Reports', api:'API Reports',
    mobile:'Mobile Reports', security:'Security Reports',
    performance:'Performance Reports', 'ui-ux':'UI/UX Reports', misc:'Misc Reports' };
  document.getElementById('page-title').textContent = titles[cat] || 'Reports';
  renderAll();
}

function renderAll() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = allData.filter(r => {
    const matchCat = currentCat === 'all' || r.category === currentCat;
    const matchQ = !q || r.name.toLowerCase().includes(q)
      || r.projectName.toLowerCase().includes(q)
      || (r.comment || '').toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  document.getElementById('total-count').textContent = filtered.length;

  const container = document.getElementById('reports-container');
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      <p>No reports found</p>
    </div>`;
    return;
  }

  // Group by project
  const groups = {};
  filtered.forEach((r, i) => {
    const proj = r.projectName || 'Unassigned';
    if (!groups[proj]) groups[proj] = [];
    groups[proj].push({ ...r, _idx: allData.indexOf(r) });
  });

  let html = '';
  for (const [proj, reports] of Object.entries(groups)) {
    html += `
    <div class="project-group">
      <div class="project-heading">
        <h2>${escHtml(proj)}</h2>
        <span class="count">${reports.length} report${reports.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="project-divider"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Report</th>
              <th>Category</th>
              <th>Date & Time</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${reports.map(r => renderRow(r)).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  }
  container.innerHTML = html;
}

function renderRow(r) {
  const clr = catColors[r.category] || 'cat-misc';
  const lbl = catLabels[r.category] || r.category.toUpperCase().slice(0,4);
  const bc  = catBadgeColors[r.category] || '#a0aec0';
  const comment = r.comment && r.comment !== '-' ? r.comment : '';
  return `
  <tr>
    <td>
      <div class="report-name">
        <div class="cat-icon ${clr}">${lbl}</div>
        <div class="report-info">
          <div class="name">${escHtml(r.name)}</div>
          ${comment ? `<div class="sub">${escHtml(comment)}</div>` : ''}
        </div>
      </div>
    </td>
    <td>
      <span class="cat-badge" style="background:${bc}22;color:${bc};">${escHtml(r.category)}</span>
    </td>
    <td>
      <div class="datetime">${escHtml(r.time || '-')}</div>
    </td>
    <td>
      <div class="actions">
        <a class="btn btn-view" href="reports/${escHtml(r.filePath)}" target="_blank">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          View
        </a>
        <button class="btn btn-copy" onclick="copyLink(this, 'reports/${escHtml(r.filePath)}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
        <div class="dot-wrap">
          <div class="dot-btn" onclick="toggleDrop(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
          </div>
          <div class="dropdown">
            <div class="dropdown-item" onclick="openEdit(${r._idx})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Edit
            </div>
            <div class="dropdown-item danger" onclick="removeReport(${r._idx})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              Remove
            </div>
          </div>
        </div>
      </div>
    </td>
  </tr>`;
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── COPY LINK ──
function copyLink(btn, path) {
  const url = location.origin + '/' + path;
  navigator.clipboard.writeText(url).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied`;
    showToast('Link copied to clipboard!');
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
    }, 2000);
  });
}

// ── 3-DOT DROPDOWN ──
function toggleDrop(btn) {
  const drop = btn.nextElementSibling;
  const isOpen = drop.classList.contains('open');
  document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
  if (!isOpen) drop.classList.add('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.dot-wrap')) {
    document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
  }
});

// ── EDIT ──
function openEdit(idx) {
  editIndex = idx;
  const r = allData[idx];
  document.getElementById('edit-name').value    = r.name || '';
  document.getElementById('edit-project').value = r.projectName || '';
  document.getElementById('edit-comment').value = r.comment !== '-' ? (r.comment || '') : '';
  document.getElementById('edit-docs').value    = r.docs !== '-' ? (r.docs || '') : '';
  document.getElementById('edit-modal').classList.add('open');
  document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editIndex = null;
}

function saveEdit() {
  if (editIndex === null) return;
  allData[editIndex].name        = document.getElementById('edit-name').value.trim() || allData[editIndex].name;
  allData[editIndex].projectName = document.getElementById('edit-project').value.trim() || allData[editIndex].projectName;
  allData[editIndex].comment     = document.getElementById('edit-comment').value.trim() || '-';
  allData[editIndex].docs        = document.getElementById('edit-docs').value.trim() || '-';
  closeModal();
  updateBadges();
  renderAll();
  showToast('Report updated successfully!');
}

// ── REMOVE ──
function removeReport(idx) {
  if (!confirm('Remove this report from the dashboard?')) return;
  allData.splice(idx, 1);
  updateBadges();
  renderAll();
  showToast('Report removed.');
  document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──
loadData();
</script>
</body>
</html>
